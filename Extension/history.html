<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>SpamShield AI - Lịch sử quét</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e1e;
            color: #fff;
            margin: 0;
            padding: 20px;
            min-width: 600px;
        }
        h2 { color: #8ab4f8; margin-bottom: 20px; }
        .toolbar {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
            align-items: center;
        }
        .toolbar button {
            background-color: #3c4043;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
        }
        .toolbar button:hover { background-color: #5f6368; }
        .toolbar button.primary { background-color: #4285f4; }
        .toolbar button.danger { background-color: #ea4335; }
        .export-group { display: flex; gap: 5px; }
        .history-list {
            background: #252525;
            border-radius: 8px;
            padding: 10px;
        }
        .history-item {
            display: flex;
            align-items: flex-start;
            border-bottom: 1px solid #333;
            padding: 10px;
            transition: background 0.2s;
        }
        .history-item:hover { background: #2d2d2d; }
        .history-item:last-child { border-bottom: none; }
        .item-checkbox {
            margin-right: 10px;
            margin-top: 3px;
            transform: scale(1.2);
        }
        .item-content { flex: 1; }
        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .item-prediction {
            font-weight: bold;
            font-size: 14px;
        }
        .ham { color: #34a853; }
        .spam { color: #fbbc04; }
        .scam { color: #ea4335; }
        .suspicious { color: #fbbc04; }
        .item-date {
            font-size: 12px;
            color: #a1a1aa;
        }
        .item-details {
            margin-top: 5px;
            font-size: 12px;
            color: #d4d4d8;
        }
        .detail-row {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .evidence-list {
            margin: 5px 0 0 20px;
            font-size: 11px;
            color: #b0b0b0;
        }
        .empty-state {
            text-align: center;
            color: #9ca3af;
            padding: 40px;
        }
        .select-all-row {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 5px 10px;
            background: #2d2d2d;
            border-radius: 4px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <h2>📋 Lịch sử quét SpamShield AI</h2>
    <div class="toolbar">
        <button id="refresh-btn">🔄 Tải lại</button>
        <div class="export-group">
            <button id="export-txt">📄 TXT</button>
            <button id="export-json">📋 JSON</button>
            <button id="export-html">🌐 HTML</button>
            <button id="export-csv">📊 CSV</button>
        </div>
        <button id="delete-selected-btn" class="danger">🗑️ Xóa đã chọn</button>
        <button id="clear-btn" style="background:#5f6368;">🗑️ Xóa tất cả</button>
    </div>

    <div class="select-all-row">
        <input type="checkbox" id="select-all-checkbox">
        <label for="select-all-checkbox" style="font-size:13px; color:#ccc;">Chọn tất cả</label>
    </div>

    <div id="history-container" class="history-list">
        <!-- Dynamic content -->
    </div>

    <script src="history.js"></script>
</body>
</html>
